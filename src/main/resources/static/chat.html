<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaging | CVRgram</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Top Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="/home" class="logo">CVRgram</a>
        </div>
        <div class="nav-center">
            <a href="/home" class="nav-item">
                <i data-lucide="home"></i>
                <span>Home</span>
            </a>
            <a href="/search" class="nav-item">
                <i data-lucide="compass"></i>
                <span>Explore</span>
            </a>
            <a href="/chat" class="nav-item active">
                <i data-lucide="message-circle"></i>
                <span>Messaging</span>
            </a>
            <a href="/notifications" class="nav-item">
                <i data-lucide="bell"></i>
                <span>Notifications</span>
            </a>
        </div>
        <div class="nav-right">
            <a href="/profile">
                <img src="https://ui-avatars.com/api/?name=User&background=random" class="nav-avatar" id="navAvatar" alt="Profile">
            </a>
            <a href="/" style="color: var(--text-light);" title="Logout">
                <i data-lucide="log-out"></i>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="app-container" style="grid-template-columns: 350px 1fr; margin-top: 16px; height: calc(100vh - 80px);">
        
        <!-- Conversations List -->
        <aside class="card" style="margin-bottom: 0; display: flex; flex-direction: column; overflow: hidden;">
            <div style="padding: 16px; border-bottom: 1px solid var(--border-color);">
                <h2 style="font-size: 18px; font-weight: 700; color: var(--primary-blue);">Messages</h2>
            </div>
            <div id="followingList" style="flex: 1; overflow-y: auto;">
                <div style="padding: 20px; text-align: center; color: var(--text-light); font-size: 14px;">
                    Loading your connections...
                </div>
            </div>
        </aside>

        <!-- Chat Area -->
        <main id="chatMain" class="card" style="margin-bottom: 0; display: flex; flex-direction: column; visibility: hidden;">
            <div style="padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: var(--white);">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <img id="activeChatAvatar" src="" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                    <div>
                        <h2 id="activeChatName" style="font-size: 16px; font-weight: 600;">Username</h2>
                        <span id="activeChatDept" style="font-size: 12px; color: var(--text-light);">Department</span>
                    </div>
                </div>
                <div style="display: flex; gap: 16px; color: var(--text-light);">
                    <i data-lucide="phone" style="width: 20px; height: 20px; cursor: pointer;"></i>
                    <i data-lucide="video" style="width: 20px; height: 20px; cursor: pointer;"></i>
                    <i data-lucide="info" style="width: 20px; height: 20px; cursor: pointer;"></i>
                </div>
            </div>
            
            <div id="chatArea" style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #f8f9fa;">
                <!-- Messages load here -->
            </div>

            <div style="padding: 16px; border-top: 1px solid var(--border-color); background: var(--white);">
                <div style="background: #f4f2ee; border-radius: 8px; padding: 12px; margin-bottom: 12px;">
                    <textarea id="messageInput" placeholder="Write a message..." 
                        style="width: 100%; border: none; padding: 0; font-size: 14px; outline: none; resize: none; background: transparent; font-family: inherit; min-height: 60px; line-height: 1.5; color: var(--text-dark);"
                        oninput="handleInput(this)"
                    ></textarea>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; gap: 20px; color: #666;">
                        <i data-lucide="image" style="width: 20px; height: 20px; cursor: pointer;"></i>
                        <i data-lucide="paperclip" style="width: 20px; height: 20px; cursor: pointer;"></i>
                        <span style="font-weight: 700; font-size: 13px; cursor: pointer; padding-top: 2px;">GIF</span>
                        <i data-lucide="smile" style="width: 20px; height: 20px; cursor: pointer;"></i>
                    </div>
                    
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <button id="sendBtn" onclick="sendMessage()" style="background: #e0e0e0; border: none; color: #919191; padding: 6px 18px; border-radius: 16px; font-weight: 600; font-size: 14px; cursor: not-allowed; transition: all 0.2s;">
                            Send
                        </button>
                        <i data-lucide="more-horizontal" style="width: 20px; height: 20px; color: #666; cursor: pointer;"></i>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- Empty State -->
        <div id="chatEmptyState" style="display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--white); border-radius: 8px; border: 1px solid var(--border-color);">
            <div style="width: 96px; height: 96px; border-radius: 50%; border: 2px solid var(--text-dark); display: flex; align-items: center; justify-content: center; margin-bottom: 16px;">
                <i data-lucide="message-square" style="width: 48px; height: 48px; color: var(--text-dark);"></i>
            </div>
            <h2 style="font-size: 22px; font-weight: 300;">Your Messages</h2>
            <p style="color: var(--text-light); margin-top: 8px;">Select a person you follow to start a conversation.</p>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script>
        lucide.createIcons();

        let stompClient = null;
        let currentUser = null;
        let activeChatUser = null;
        let currentSubscription = null;
        let isConnected = false;
        let followedUsers = [];

        async function initChat() {
            try {
                const res = await fetch('/profile/data');
                if (res.ok) {
                    currentUser = await res.json();
                    document.getElementById('navAvatar').src = currentUser.profilePhotoUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.username)}&background=random`;
                    connect();
                    loadFollowing();
                } else { window.location.href = '/login'; }
            } catch (e) { console.error(e); }
        }

        function connect() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;
            stompClient.connect({}, () => {
                console.log("WebSocket Connected!");
                isConnected = true;
                if (activeChatUser) selectUserById(activeChatUser.id);
            }, (err) => {
                console.error("WebSocket Error:", err);
                isConnected = false;
                setTimeout(connect, 5000);
            });
        }

        async function loadFollowing() {
            try {
                const res = await fetch('/api/chat/following');
                followedUsers = await res.json();
                const list = document.getElementById('followingList');
                
                if (followedUsers.length === 0) {
                    list.innerHTML = `<div style="padding: 20px; text-align: center; color: var(--text-light); font-size: 14px;">You aren't following anyone yet.</div>`;
                    return;
                }

                list.innerHTML = followedUsers.map(user => {
                    const avatar = user.profilePhotoUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.username)}&background=random`;
                    return `
                        <div onclick="selectUserById(${user.id})" class="following-item" id="user-item-${user.id}" style="padding: 12px 16px; display: flex; gap: 12px; cursor: pointer; border-bottom: 1px solid #f0f2f5;">
                            <img src="${avatar}" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover;">
                            <div style="flex: 1; overflow: hidden;">
                                <div style="font-size: 14px; font-weight: 600;">${user.username}</div>
                                <div style="font-size: 12px; color: var(--text-light); text-overflow: ellipsis; white-space: nowrap; overflow: hidden;">
                                    ${user.headline || 'View profile'}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { console.error(e); }
        }

        function selectUserById(userId) {
            const user = followedUsers.find(u => u.id === userId);
            if (!user) return;
            
            activeChatUser = user;
            document.getElementById('chatEmptyState').style.display = 'none';
            const main = document.getElementById('chatMain');
            main.style.visibility = 'visible';
            main.style.display = 'flex';
            
            document.getElementById('activeChatName').innerText = user.username;
            document.getElementById('activeChatDept').innerText = user.department || 'Student';
            document.getElementById('activeChatAvatar').src = user.profilePhotoUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.username)}&background=random`;
            
            document.querySelectorAll('.following-item').forEach(el => el.style.background = 'transparent');
            const activeItem = document.getElementById(`user-item-${userId}`);
            if (activeItem) {
                activeItem.style.background = '#eef3f8';
                // Remove the "New Message" dot when selected
                const dot = activeItem.querySelector('.sidebar-dot');
                if (dot) dot.remove();
            }

            if (isConnected && stompClient) {
                if (currentSubscription) currentSubscription.unsubscribe();
                const ids = [Number(currentUser.id), Number(user.id)].sort((a, b) => a - b);
                const topic = `/topic/messages/${ids[0]}_${ids[1]}`;
                currentSubscription = stompClient.subscribe(topic, (payload) => {
                    displayMessage(JSON.parse(payload.body));
                });
            }
            loadHistory(user.id);
        }

        async function loadHistory(otherId) {
            try {
                const res = await fetch(`/api/chat/history/${otherId}`);
                const history = await res.json();
                const chatArea = document.getElementById('chatArea');
                chatArea.innerHTML = '';
                history.forEach(displayMessage);
                chatArea.scrollTop = chatArea.scrollHeight;
            } catch (e) { console.error(e); }
        }

        function handleInput(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
            const btn = document.getElementById('sendBtn');
            const hasText = el.value.trim().length > 0;
            btn.style.background = hasText ? 'var(--primary-blue)' : '#e0e0e0';
            btn.style.color = hasText ? 'white' : '#919191';
            btn.style.cursor = hasText ? 'pointer' : 'not-allowed';
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (content && isConnected && stompClient && activeChatUser) {
                const msg = { senderUsername: currentUser.username, recipientId: activeChatUser.id, content: content };
                stompClient.send("/app/chat.privateMessage", {}, JSON.stringify(msg));
                input.value = '';
                handleInput(input);
            }
        }

        function displayMessage(message) {
            const chatArea = document.getElementById('chatArea');
            const isMe = message.sender.id === currentUser.id;
            const msgWrapper = document.createElement('div');
            msgWrapper.style.display = 'flex';
            msgWrapper.style.justifyContent = isMe ? 'flex-end' : 'flex-start';
            msgWrapper.style.marginBottom = '12px';
            msgWrapper.style.width = '100%';

            const msgContent = document.createElement('div');
            msgContent.style.maxWidth = '70%';
            msgContent.style.padding = '8px 16px';
            msgContent.style.borderRadius = isMe ? '18px 18px 4px 18px' : '18px 18px 18px 4px';
            msgContent.style.backgroundColor = isMe ? 'var(--primary-blue)' : '#f0f2f5';
            msgContent.style.color = isMe ? 'white' : 'var(--text-dark)';
            msgContent.style.fontSize = '14px';
            msgContent.innerText = message.content;

            msgWrapper.appendChild(msgContent);
            chatArea.appendChild(msgWrapper);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        initChat();
    </script>
    <style>
        .following-item:hover { background: #f0f2f5 !important; }
    </style>
    <script src="/script.js"></script>
</body>
</html>
