<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVRgram Register</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">

    <!-- Top Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="/" class="logo">CVRgram</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">Join CVRgram</h1>
            <p class="auth-subtitle">Make the most of your professional life</p>

            <div class="input-group">
                <input type="text" id="username" placeholder="Full Name">
            </div>

            <div class="input-group">
                <input type="text" id="department" placeholder="Department (e.g. CSE)">
            </div>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="Email (@cvr.ac.in)">
            </div>
            
            <div class="input-group" style="position: relative;">
                <input type="password" id="password" placeholder="Password (6+ characters)" style="padding-right: 40px;">
                <span class="password-toggle" onclick="togglePasswordVisibility('password', this)">
                    <i data-lucide="eye" class="eye-icon" style="width: 20px; height: 20px;"></i>
                    <i data-lucide="eye-off" class="eye-off-icon" style="display: none; width: 20px; height: 20px;"></i>
                </span>
            </div>

            <button class="btn-auth" onclick="register()">Agree & Join</button>

            <div class="auth-links">
                Already on CVRgram? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>
    <script>
        if (window.lucide) {
            lucide.createIcons();
        }
    </script>
    <script src="/script.js"></script>
</body>
</html>
