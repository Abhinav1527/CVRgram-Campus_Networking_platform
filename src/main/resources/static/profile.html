<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="sidebar">
    <div class="logo">CVRgram</div>

    <a href="/home">
        <i data-lucide="home"></i>
        <span>Home</span>
    </a>

    <a href="/search">
        <i data-lucide="search"></i>
        <span>Search</span>
    </a>

    <a href="/profile">
        <i data-lucide="user"></i>
        <span>Profile</span>
    </a>

    <a href="/chat">
        <i data-lucide="message-circle"></i>
        <span>Messages</span>
    </a>

    <a href="/">
        <i data-lucide="log-out"></i>
        <span>Logout</span>
    </a>
</div>

    <div class="main">
        <div class="card">
            <h2>User Profile</h2>
            <p>Name: <span id="name"></span></p>
            <p>Email: <span id="email"></span></p>
            <p>Department: <span id="department"></span></p>
        </div>
    </div>

</div>

<script>
    lucide.createIcons();
</script>

<script src="/script.js"></script>

<script>
    fetch("/profile/data")
        .then(res => res.json())
        .then(user => {

            if (!user) {
                window.location.href = "/auth/login";
                return;
            }

            document.getElementById("name").innerText = user.username;
            document.getElementById("email").innerText = user.email;
            document.getElementById("department").innerText = user.department;
        });
</script>

</body>
</html>
